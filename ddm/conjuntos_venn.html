<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operações de Conjuntos SQL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Calibri', 'Segoe UI', sans-serif;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 24px;
    color: #1a1a1a;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 24px;
  }
  .btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 8px;
  }
  .op-btn {
    cursor: pointer;
    border: 1px solid #ccc;
    background: #fff;
    color: #333;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    transition: all .15s;
  }
  .op-btn:hover { background: #f5f5f5; }
  .op-btn.active { border-color: #555; font-weight: 600; background: #fafafa; }
  svg { max-width: 620px; width: 100%; }
  .rule {
    font-size: 14px;
    color: #555;
    text-align: center;
    min-height: 20px;
    margin-top: 4px;
    max-width: 600px;
  }
  .sql-wrap {
    text-align: center;
    margin-top: 10px;
  }
  .sql-box {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    background: #f7f7f7;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 10px 18px;
    display: inline-block;
    text-align: left;
    line-height: 1.7;
    color: #1a1a1a;
  }
  .sql-box b { color: #E8372A; }
  .note {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    margin-top: 8px;
  }
  /* footer */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 11px;
    color: #999;
    border-top: 1px solid #e0e0e0;
  }
</style>
</head>
<body>

<h1>Operações de Conjuntos · SQL</h1>

<div class="btns">
  <button class="op-btn active" onclick="setOp('union',this)">UNION</button>
  <button class="op-btn" onclick="setOp('intersect',this)">INTERSECT</button>
  <button class="op-btn" onclick="setOp('except_ab',this)">A EXCEPT B</button>
  <button class="op-btn" onclick="setOp('except_ba',this)">B EXCEPT A</button>
</div>

<svg viewBox="0 0 620 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Diagrama de Venn — operações de conjuntos SQL</title>
  <defs>
    <clipPath id="onlyA"><circle cx="250" cy="148" r="115"/></clipPath>
    <mask id="maskAonly">
      <rect width="620" height="300" fill="white"/>
      <circle cx="380" cy="148" r="115" fill="black"/>
    </mask>
    <mask id="maskBonly">
      <rect width="620" height="300" fill="white"/>
      <circle cx="250" cy="148" r="115" fill="black"/>
    </mask>
  </defs>

  <!-- Região exclusiva A — amarelo -->
  <circle id="reg-a" cx="250" cy="148" r="115"
    fill="#EF9F27" opacity="0.08"
    mask="url(#maskAonly)"
    style="transition:opacity .35s"/>

  <!-- Região exclusiva B — verde -->
  <circle id="reg-b" cx="380" cy="148" r="115"
    fill="#639922" opacity="0.08"
    mask="url(#maskBonly)"
    style="transition:opacity .35s"/>

  <!-- Interseção — amarelo-verde -->
  <g clip-path="url(#onlyA)">
    <circle id="reg-i" cx="380" cy="148" r="115"
      fill="#97C459" opacity="0.25"
      style="transition:opacity .35s"/>
  </g>

  <!-- Contornos -->
  <circle cx="250" cy="148" r="115" fill="none" stroke="#BA7517" stroke-width="1.5" opacity="0.65"/>
  <circle cx="380" cy="148" r="115" fill="none" stroke="#3B6D11" stroke-width="1.5" opacity="0.65"/>

  <!-- Labels A e B -->
  <text x="205" y="115" text-anchor="middle" font-size="17" font-weight="600" fill="#BA7517" font-family="Calibri,sans-serif">A</text>
  <text x="425" y="115" text-anchor="middle" font-size="17" font-weight="600" fill="#3B6D11" font-family="Calibri,sans-serif">B</text>

  <!-- Conteúdo regiões -->
  <text x="196" y="135" text-anchor="middle" font-size="12" fill="#666" font-family="Calibri,sans-serif">vendidos mas</text>
  <text x="196" y="151" text-anchor="middle" font-size="12" fill="#666" font-family="Calibri,sans-serif">sem registo</text>
  <text x="196" y="167" text-anchor="middle" font-size="12" fill="#666" font-family="Calibri,sans-serif">em Product</text>
  <text x="315" y="141" text-anchor="middle" font-size="12" fill="#444" font-family="Calibri,sans-serif">produtos</text>
  <text x="315" y="157" text-anchor="middle" font-size="12" fill="#444" font-family="Calibri,sans-serif">com vendas</text>
  <text x="434" y="141" text-anchor="middle" font-size="12" fill="#666" font-family="Calibri,sans-serif">no catálogo</text>
  <text x="434" y="157" text-anchor="middle" font-size="12" fill="#666" font-family="Calibri,sans-serif">sem vendas</text>

  <!-- Legenda -->
  <circle cx="80" cy="280" r="7" fill="#EF9F27" opacity="0.75"/>
  <text x="94" y="284" font-size="11" fill="#888" font-family="Calibri,sans-serif">A = ProductID em SalesOrderDetail</text>
  <circle cx="360" cy="280" r="7" fill="#639922" opacity="0.75"/>
  <text x="374" y="284" font-size="11" fill="#888" font-family="Calibri,sans-serif">B = ProductID em Product</text>
</svg>

<div class="rule" id="rule"></div>
<div class="sql-wrap"><div class="sql-box" id="sql"></div></div>
<p class="note">⚠ As duas queries têm de devolver o mesmo número de colunas e tipos compatíveis</p>

<div class="footer">
  <span>Data Science &amp; Business Analytics · ISEG · 6.ª Edição · Tutoria · Sessão 3</span>
  <span>DDM</span>
</div>

<script>
const configs = {
  union: {
    a:.6, i:.55, b:.6,
    rule: 'Todos os ProductIDs de A e de B: sem repetições  ·  UNION ALL mantém duplicados',
    sql: "SELECT ProductID FROM SalesOrderDetail\n<b>UNION</b>\nSELECT ProductID FROM Product"
  },
  intersect: {
    a:.04, i:.75, b:.04,
    rule: 'Produtos que existem no catálogo e têm vendas',
    sql: "SELECT ProductID FROM SalesOrderDetail\n<b>INTERSECT</b>\nSELECT ProductID FROM Product"
  },
  except_ab: {
    a:.6, i:.04, b:.04,
    rule: 'Só em A: ProductIDs em SalesOrderDetail que não existem em Product  ·  Ex. II.69',
    sql: "SELECT ProductID FROM SalesOrderDetail\n<b>EXCEPT</b>\nSELECT ProductID FROM Product"
  },
  except_ba: {
    a:.04, i:.04, b:.6,
    rule: 'Só em B: produtos no catálogo sem nenhuma venda  ·  Ex. II.68',
    sql: "SELECT ProductID FROM Product\n<b>EXCEPT</b>\nSELECT ProductID FROM SalesOrderDetail"
  }
};
function setOp(op, btn) {
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const c = configs[op];
  document.getElementById('reg-a').style.opacity = c.a;
  document.getElementById('reg-i').style.opacity = c.i;
  document.getElementById('reg-b').style.opacity = c.b;
  document.getElementById('rule').textContent = c.rule;
  document.getElementById('sql').innerHTML = c.sql.replace(/\n/g,'<br>');
}
setOp('union', document.querySelector('.op-btn'));
</script>
</body>
</html>
